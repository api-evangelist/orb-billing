aid: orb-billing
name: Orb
review:
  question: Does Orb expose a documented public WebSocket API?
  answer: false
  date: '2026-06-20'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was created. Orb's only documented event-driven
    surface is outbound HTTP webhooks (server-to-server POST callbacks). There
    is no WebSocket (ws://, wss://) endpoint and no Server-Sent Events (SSE)
    streaming surface documented. Under current API Evangelist scope, AsyncAPI
    modeling is reserved for real streaming transports (WebSocket or HTTP SSE);
    plain outbound webhooks are documented in the catalog as a webhooks API but
    are not modeled as AsyncAPI. No asyncapi/ artifact was authored.
findings:
  summary: |
    Orb does not publish a documented public WebSocket API. The Orb platform
    is a REST (HTTPS) API served under https://api.withorb.com/v1, with Bearer
    API key authentication. Usage events are ingested via a synchronous REST
    POST to /ingest (batched, idempotent). Orb delivers asynchronous
    notifications exclusively through outbound HTTP webhooks - at-least-once
    POST callbacks to a customer-configured endpoint, signed with an
    HMAC-SHA256 X-Orb-Signature header and an X-Orb-Timestamp header for
    replay protection, with a scheduled retry backoff. No realtime,
    bidirectional, or streaming WebSocket or SSE surface is documented for
    events, customers, subscriptions, invoices, or credits.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.withorb.com/v1
      documented: true
    - protocol: Webhooks
      scheme: https
      note: Outbound at-least-once server-to-server POST callbacks signed with HMAC-SHA256 (X-Orb-Signature) plus X-Orb-Timestamp. Not WebSocket.
      documented: true
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events streaming surface is documented.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented in Orb's API reference or webhooks documentation as of the review date.
