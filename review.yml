sources:
  - url: https://docs.withorb.com/api-reference
    type: APIReference
    note: All documented endpoints are HTTPS REST under https://api.withorb.com/v1 with Bearer auth.
  - url: https://docs.withorb.com/events-and-metrics/event-ingestion
    type: Documentation
    note: Event ingestion is a synchronous REST POST to /ingest with batched, idempotent events; no streaming socket.
  - url: https://docs.withorb.com/guides/integrations-and-exports/webhooks
    type: Documentation
    note: Asynchronous notifications use outbound HTTP webhooks signed with HMAC-SHA256 (X-Orb-Signature) and X-Orb-Timestamp; not WebSocket.
  - url: https://docs.withorb.com/api-reference/rate-limits
    type: Documentation
    note: No hard published rate limit; 429 with exponential backoff guidance.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or SSE streaming protocol surface exists. Orb's only
    event-driven mechanism is outbound HTTP webhooks, which are catalogued as
    a webhooks API in apis.yml but not modeled as AsyncAPI under current scope.
    No asyncapi/ document was authored.
